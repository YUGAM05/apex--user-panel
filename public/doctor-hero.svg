<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBF4FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)" rx="24"/>
  
  <!-- Doctor Figure -->
  <g transform="translate(200, 100)">
    <!-- Body -->
    <path d="M120 450 L120 300 C120 260 160 250 200 250 C240 250 280 260 280 300 L280 450" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <path d="M200 250 L200 450" stroke="#E2E8F0" stroke-width="2"/>
    
    <!-- Coat Lapels -->
    <path d="M200 250 L160 350 L200 320" fill="#F1F5F9"/>
    <path d="M200 250 L240 350 L200 320" fill="#F1F5F9"/>
    
    <!-- Stethoscope -->
    <path d="M160 210 C140 210 140 300 150 320" stroke="#374151" stroke-width="4" fill="none"/>
    <path d="M240 210 C260 210 260 300 250 320" stroke="#374151" stroke-width="4" fill="none"/>
    <circle cx="200" cy="350" r="15" fill="#94A3B8"/>
    
    <!-- Head -->
    <circle cx="200" cy="180" r="50" fill="#FDE68A"/> 
    <path d="M150 160 C150 130 180 120 200 120 C220 120 250 130 250 160" fill="#1E293B"/> <!-- Hair -->
    
    <!-- Face Mask -->
    <path d="M165 190 Q200 210 235 190 L235 170 Q200 150 165 170 Z" fill="#60A5FA" opacity="0.9"/>
    
    <circle cx="185" cy="165" r="3" fill="#1E293B"/>
    <circle cx="215" cy="165" r="3" fill="#1E293B"/>
  </g>
  
  <!-- Medical Elements Floating -->
  <g transform="translate(500, 200)">
    <circle cx="0" cy="0" r="30" fill="#FECACA" opacity="0.5"/>
    <rect x="-10" y="-20" width="20" height="40" fill="#EF4444" rx="5"/>
    <rect x="-20" y="-10" width="40" height="20" fill="#EF4444" rx="5"/>
  </g>
  
  <g transform="translate(100, 300)">
    <circle cx="0" cy="0" r="20" fill="#BFDBFE" opacity="0.6"/>
    <path d="M-10 -10 L10 10 M10 -10 L-10 10" stroke="#2563EB" stroke-width="3"/>
  </g>

</svg>
